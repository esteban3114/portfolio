<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ESTBN — Developer Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #0d0d0d;
    --accent: #e8a838;
    --accent-deep: #c9871f;
    --label: #c7c7c7;
    --dim: #6d6d6d;
    --pos: #00ff9f;
    --neg: #ff3b3b;
    --blue: #5b8fe6;
    --black: #0a0a0a;
    --grid: #1b1b1b;
    --typespeed: 14ms;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #000;
    color: var(--accent);
    font-family: "IBM Plex Mono", ui-monospace, Menlo, monospace;
    height: 100%;
    overflow: hidden;
  }
  #root { height: 100%; }
  body { -webkit-font-smoothing: antialiased; letter-spacing: -0.2px; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #050505; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

  .blink { animation: blink 1s steps(1) infinite; }
  @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }

  .scanlines::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.22) 3px,
      rgba(0,0,0,0.22) 3px
    );
    z-index: 9000;
    mix-blend-mode: multiply;
  }
  .scanlines::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
    z-index: 9001;
  }

  /* ===== TERMINAL LAYOUT ===== */
  .app { height: 100%; width: 100%; background: var(--bg); }

  .terminal {
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    min-width: 760px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.35;
  }

  /* BOOT */
  .boot {
    height: 100%;
    background: #000;
    padding: 6vh 8vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .boot-pre {
    margin: 0;
    font-family: inherit;
    font-size: clamp(13px, 1.5vw, 18px);
    line-height: 1.7;
  }
  .bl { white-space: pre; }
  .boot-title { color: var(--accent); font-weight: 700; letter-spacing: 1px; }
  .boot-dim { color: var(--dim); }
  .bl.boot-ok { color: #b9b9b9; }
  .boot-go {
    margin-top: 3.5vh;
    color: var(--pos);
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    font-size: clamp(13px, 1.4vw, 17px);
  }
  .blink-slow { animation: blinkslow 1.2s steps(1) infinite; }
  @keyframes blinkslow { 0%,55% { opacity: 1; } 55.01%,100% { opacity: 0.15; } }
  .cursor { color: var(--accent); }

  /* FUNCTION BAR */
  .fbar {
    display: flex;
    align-items: center;
    gap: 3px;
    background: #111;
    padding: 3px 6px;
    border-bottom: 1px solid #000;
    font-size: 11px;
    flex: 0 0 auto;
  }
  .fk { padding: 1px 6px; font-weight: 700; letter-spacing: 0.5px; font-size: 11px; }
  .fk-red { background: #c01616; color: #fff; }
  .fk-green { background: #1f8a3b; color: #001a08; }
  .fbar-tabs { margin-left: auto; background: #e8d000; color: #111; padding: 1px 7px; font-weight: 700; }
  .fbar-opt { color: #9a9a9a; padding: 1px 8px; }

  /* COMMAND BAR */
  .cmdbar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #050505;
    padding: 4px 8px;
    border-bottom: 1px solid #1d1d1d;
    font-size: 14px;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .cb-arrow { color: #cfcfcf; font-size: 17px; line-height: 1; }
  .cb-sep { color: #444; }
  .cb-tick { color: #ffffff; font-weight: 700; }
  .cb-eq { color: var(--accent); }
  .cb-cv { color: #7a7a7a; font-size: 11px; }
  .cb-fn { color: var(--accent); font-weight: 600; }
  .cb-rel { color: #cfcfcf; }
  .cb-spacer { flex: 1; }
  .cb-msg { color: #cfcfcf; }
  .cb-ico { color: #cfcfcf; }

  /* TICKER */
  .ticker { background: var(--bg); padding: 2px 8px 4px; flex: 0 0 auto; }
  .tick1 {
    display: flex;
    align-items: baseline;
    gap: 14px;
    white-space: nowrap;
    font-size: 22px;
    font-weight: 700;
  }
  .t-tick { color: #ffffff; }
  .t-mkt { color: var(--accent); }
  .t-dollar { color: var(--accent); font-size: 16px; }
  .t-up { color: var(--pos); }
  .t-big { color: var(--accent); letter-spacing: 1px; }
  .t-spark { color: var(--pos); letter-spacing: -1px; font-size: 18px; }
  .t-right { color: #d8d8d8; margin-left: auto; }
  .t-right2 { color: #d8d8d8; }
  .tick2 {
    display: flex;
    gap: 22px;
    white-space: nowrap;
    font-size: 14px;
    color: var(--accent);
    margin-top: 3px;
    align-items: baseline;
  }
  .tick2 b { color: #ffffff; font-weight: 700; }
  .tick2 b.g { color: var(--pos); }
  .t2-clock { color: var(--bg); background: var(--accent); padding: 0 6px; font-weight: 700; }
  .t2-d { color: var(--dim); }

  /* TITLE BAND */
  .band {
    display: flex;
    align-items: center;
    gap: 26px;
    background: var(--accent);
    color: var(--black);
    padding: 3px 10px;
    font-weight: 700;
    font-size: 15px;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .band-title { letter-spacing: 0.5px; }
  .band-mid { color: #8a1414; font-weight: 700; }
  .band-right {
    margin-left: auto;
    background: #b81414;
    color: #fff;
    padding: 3px 12px;
    letter-spacing: 0.5px;
  }

  /* SUB BAR */
  .subbar {
    display: flex;
    align-items: baseline;
    gap: 20px;
    background: var(--bg);
    padding: 3px 10px;
    font-size: 14px;
    flex: 0 0 auto;
    white-space: nowrap;
    border-bottom: 1px solid #161616;
  }
  .sb-name { color: var(--accent); font-weight: 700; }
  .sb-role { color: #cfcfcf; }
  .sb-id { color: var(--dim); }

  /* TABS */
  .tabs {
    display: flex;
    align-items: stretch;
    background: #0c0c0c;
    flex: 0 0 auto;
    border-bottom: 1px solid #222;
  }
  .tab {
    background: transparent;
    border: none;
    border-right: 1px solid #222;
    color: var(--accent);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 18px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .tab:hover { background: #161616; }
  .tab-num { color: #ffffff; }
  .tab-active { background: var(--accent); color: var(--black); }
  .tab-active .tab-num { color: var(--black); }
  .tabs-fill { flex: 1; border-bottom: 1px solid #222; }

  /* SCREEN */
  .screen {
    flex: 1 1 auto;
    overflow: auto;
    padding: 12px 14px 14px;
    background: var(--bg);
  }
  .screen-head {
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
    font-size: 14px;
    border-bottom: 1px solid #2a2a2a;
    padding-bottom: 4px;
    margin-bottom: 10px;
  }
  .typed { font-size: 15px; line-height: 1.65; }
  .tline { white-space: pre; }

  /* segment colors */
  .s-num { color: var(--accent); font-weight: 600; }
  .s-label { color: var(--label); }
  .s-val { color: var(--accent); }
  .s-valbold { color: #ffffff; font-weight: 700; }
  .s-pos { color: var(--pos); font-weight: 600; }
  .s-neg { color: var(--neg); font-weight: 600; }
  .s-section-head {
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
    border-bottom: 1px dotted #3a3a3a;
  }
  .s-colhead { color: #9a9a9a; font-weight: 700; letter-spacing: 0.5px; }
  .s-dim { color: var(--dim); }
  .s-barfill { color: var(--pos); letter-spacing: -1px; }
  .s-blueval { color: var(--blue); text-decoration: underline; }

  /* NEWS */
  .news {
    flex: 0 0 auto;
    background: #05060a;
    border-top: 1px solid #1a1f2e;
    padding: 4px 10px;
    font-size: 13.5px;
    line-height: 1.55;
  }
  .news-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nw-n { color: #3d6aa8; margin-right: 10px; }
  .nw-t { color: #5b8fe6; margin-right: 10px; }
  .nw-tag { color: var(--accent); font-weight: 700; display: inline-block; width: 64px; }
  .nw-txt { color: #6f9bdc; }

  /* HINT BAR */
  .hint {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 26px;
    background: #0c0c0c;
    border-top: 1px solid #222;
    padding: 4px 10px;
    font-size: 13px;
    white-space: nowrap;
  }
  .hint-sug { color: var(--accent); font-weight: 700; }
  .hint-fn { color: #b9b9b9; }
  .hint-fn b { color: #ffffff; }
  .hint-right { margin-left: auto; color: var(--dim); }

  /* TWEAKS accent swatches */
  .tw-accent-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
  .tw-accent-label { font-size: 13px; color: #cfcfcf; }
  .tw-accent-swatches { display: flex; gap: 8px; }
  .tw-sw { width: 26px; height: 26px; border: 2px solid #333; cursor: pointer; padding: 0; }
  .tw-sw-on { border-color: #fff; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
